<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SV 密码计算器 · Web Crypto 版</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 16px; }
        .card { background: #16213e; border-radius: 20px; padding: 20px; max-width: 480px; margin: 0 auto; }
        h2 { color: #e94560; }
        .tabs { display: flex; margin-bottom: 16px; }
        .tab-btn { flex: 1; padding: 12px; background: #0f3460; border: none; color: white; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #e94560; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; color: #ccc; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1.2rem; background: #0f3460; color: white; }
        .btn { background: #e94560; color: white; border: none; padding: 14px; font-size: 1.4rem; width: 100%; border-radius: 30px; cursor: pointer; margin-top: 8px; }
        .result { margin-top: 20px; background: #0f3460; padding: 16px; border-radius: 12px; text-align: center; }
        .password { font-size: 3rem; font-family: monospace; color: #7ee787; letter-spacing: 8px; word-break: break-all; }
        .info { font-size: 0.8rem; color: #aaa; margin-top: 8px; word-break: break-all; }
        .verified { color: #3fb950; font-size: 0.7rem; margin-top: 4px; }
        .warning { color: #d2991d; font-size: 0.8rem; margin-top: 8px; }
    </style>
</head>
<body>
<div class="card">
    <h2>⚙️ SV 工程密码</h2>
    <div class="tabs">
        <button class="tab-btn active" id="tabVin" onclick="switchMode('vin')">VIN</button>
        <button class="tab-btn" id="tabChery" onclick="switchMode('chery')">Chery@</button>
    </div>

    <div id="vinMode">
        <div class="input-group">
            <label>VIN 后六位</label>
            <input type="text" id="vinInput" value="239399" oninput="compute()">
        </div>
        <div class="input-group">
            <label>随机码 (4位)</label>
            <input type="text" id="randomVin" value="5109" oninput="compute()">
        </div>
    </div>

    <div id="cheryMode" style="display:none;">
        <div class="input-group">
            <label>ProductID 后六位</label>
            <input type="text" id="prodInput" value="000346" oninput="compute()">
        </div>
        <div class="input-group">
            <label>ranNum (4位)</label>
            <input type="text" id="randomChery" value="4997" oninput="compute()">
        </div>
    </div>

    <button class="btn" onclick="compute()">计 算 密 码</button>

    <div class="result">
        <div class="password" id="passwordResult">加载中...</div>
        <div class="info" id="fullHexPreview"></div>
        <div class="verified">✅ VIN(239399+5109)=79c873 | Chery(000346+4997)=Chery@380156</div>
        <div class="warning" id="warningText" style="display:none;">⚠️ 请使用 localhost 或 HTTPS 打开此页面</div>
    </div>
</div>

<script>
const KEY_HEX = "2377DEAE3106286889297B8AEC0A157E";
let currentMode = 'vin';

// 检查环境
if (window.crypto && window.crypto.subtle) {
    document.getElementById('warningText').style.display = 'none';
} else {
    document.getElementById('warningText').style.display = 'block';
}

function getLast6(s) {
    const c = s.trim().toUpperCase();
    return c.length > 6 ? c.slice(-6) : c.padStart(6, '0');
}

// 使用 Web Crypto API 实现 AES-CMAC
async function aesCmac(keyHex, message) {
    const keyBytes = new Uint8Array(keyHex.match(/.{2}/g).map(b => parseInt(b, 16)));
    const key = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-CBC" }, false, ["encrypt"]);

    const msgBytes = new TextEncoder().encode(message);
    const blockSize = 16;

    // 1. 生成子密钥 K1, K2
    const zero = new Uint8Array(16);
    const L = new Uint8Array(await crypto.subtle.encrypt(
        { name: "AES-CBC", iv: zero }, key, zero
    ));  // AES-CBC with zero IV and zero plaintext = AES(0)

    function leftShift128(arr) {
        let carry = 0;
        const res = new Uint8Array(16);
        for (let i = 15; i >= 0; i--) {
            let val = arr[i];
            let nc = (val & 0x80) ? 1 : 0;
            res[i] = ((val << 1) & 0xFF) | carry;
            carry = nc;
        }
        if (carry) res[15] ^= 0x87;
        return res;
    }
    const K1 = leftShift128(L);
    const K2 = leftShift128(K1);

    // 2. 填充
    const isComplete = (msgBytes.length % blockSize === 0 && msgBytes.length > 0);
    let padded;
    if (isComplete) {
        padded = msgBytes.slice();
    } else {
        padded = new Uint8Array(msgBytes.length + blockSize - (msgBytes.length % blockSize));
        padded.set(msgBytes);
        padded[msgBytes.length] = 0x80;
        for (let i = msgBytes.length + 1; i < padded.length; i++) padded[i] = 0x00;
    }

    // 3. 分块
    const blocks = [];
    for (let i = 0; i < padded.length; i += blockSize) {
        blocks.push(padded.slice(i, i + blockSize));
    }

    // 4. 最后一块异或子密钥
    let lastBlock = blocks.pop();
    const subKey = isComplete ? K1 : K2;
    for (let i = 0; i < blockSize; i++) {
        lastBlock[i] ^= subKey[i];
    }

    // 5. CBC-MAC (使用 ECB 方式：每次用零 IV 加密一个异或后的块)
    let x = new Uint8Array(16);
    const zeroIv = new Uint8Array(16);
    for (const blk of blocks) {
        const input = new Uint8Array(16);
        for (let i = 0; i < 16; i++) input[i] = blk[i] ^ x[i];
        x = new Uint8Array(await crypto.subtle.encrypt(
            { name: "AES-CBC", iv: zeroIv }, key, input
        ));
    }
    // 最后一块
    const finalInput = new Uint8Array(16);
    for (let i = 0; i < 16; i++) finalInput[i] = lastBlock[i] ^ x[i];
    const cmac = new Uint8Array(await crypto.subtle.encrypt(
        { name: "AES-CBC", iv: zeroIv }, key, finalInput
    ));

    return Array.from(cmac).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function compute() {
    if (!window.crypto || !window.crypto.subtle) {
        document.getElementById('passwordResult').textContent = '请使用HTTPS/localhost';
        return;
    }

    let inp6, r4;
    if (currentMode === 'vin') {
        inp6 = getLast6(document.getElementById('vinInput').value);
        r4 = document.getElementById('randomVin').value.trim();
    } else {
        inp6 = getLast6(document.getElementById('prodInput').value);
        r4 = document.getElementById('randomChery').value.trim();
    }

    if (!/^\d{4}$/.test(r4)) {
        document.getElementById('passwordResult').textContent = '随机码需4位数字';
        document.getElementById('fullHexPreview').innerHTML = '';
        return;
    }

    const raw = inp6 + r4 + "0123";
    try {
        const fullHex = (await aesCmac(KEY_HEX, raw)).toLowerCase();
        const password = fullHex.slice(-6);
        const display = currentMode === 'chery' ? 'Chery@' + password : password;
        document.getElementById('passwordResult').textContent = display;
        document.getElementById('fullHexPreview').innerHTML = `输入: "${raw}"<br>CMAC: ${fullHex}<br>密码: ${password}`;
    } catch (e) {
        document.getElementById('passwordResult').textContent = '计算错误';
        console.error(e);
    }
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('vinMode').style.display = mode === 'vin' ? 'block' : 'none';
    document.getElementById('cheryMode').style.display = mode === 'chery' ? 'block' : 'none';
    document.getElementById('tabVin').classList.toggle('active', mode === 'vin');
    document.getElementById('tabChery').classList.toggle('active', mode === 'chery');
    compute();
}

window.onload = compute;
</script>
</body>
</html>
